<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .movies {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .movie-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
        }

        .movie-card h2 {
            margin-top: 15px;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <h1>Now Showing</h1>

    <div class="movies">

        <div class="movie-card">
            <img src="https://upload.wikimedia.org/wikipedia/en/7/7e/Leo_%282023_Indian_film%29.jpg">
            <h2>Leo</h2>
            <a href="index.html" class="btn">Book Now</a>
        </div>

        <div class="movie-card">
            <img src="https://upload.wikimedia.org/wikipedia/en/7/7d/Jailer_film_poster.jpg">
            <h2>Jailer</h2>
            <a href="index.html" class="btn">Book Now</a>
        </div>

        <div class="movie-card">
            <img src="https://upload.wikimedia.org/wikipedia/en/0/05/The_Greatest_of_All_Time.jpg">
            <h2>GOAT</h2>
            <a href="index.html" class="btn">Book Now</a>
        </div>

        <div class="movie-card">
            <img src="https://upload.wikimedia.org/wikipedia/en/3/3d/Coolie_film_poster.jpg">
            <h2>Coolie</h2>
            <a href="index.html" class="btn">Book Now</a>
        </div>

    </div>

</body>

</html>
