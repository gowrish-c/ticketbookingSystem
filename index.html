<!DOCTYPE html>
<html lang="en">

<head>
    <title>Ticket Booking - Home</title>
</head>

<body style="font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px;">


    <main style="background-color: white; max-width: 500px; margin: 40px auto; padding: 30px; border: 1px solid #ccc;">


        <nav style="text-align: center; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; margin-bottom: 20px;">
            <a href="index.html"
                style="color: #007bff; text-decoration: none; margin: 0 15px; font-weight: bold;">Home</a>
            <a href="success.html"
                style="color: #007bff; text-decoration: none; margin: 0 15px; font-weight: bold;">Booking Status</a>
            <a href="movies.html" style="color: #007bff; text-decoration: none; margin: 0 15px; font-weight: bold;">View
                Movies</a>
        </nav>

        <h1 style="text-align: center; color: #333;">Book Your Tickets</h1>


        <form action="success.html">
            <div style="text-align: right; margin-bottom: 15px">
                <a href="https://wikipedia.org" target="_blank">Need any help?</a>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px;">Enter your name</label>
                <input type="text" required
                    style="width: 100%; padding: 12px; font-size: 16px; border:1px; solid #ccc; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px;">Step 1: Choose Movie</label>
                <select required
                    style="width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; box-sizing: border-box;">
                    <option value="">Select a movie...</option>
                    <option>Karuppu</option>
                    <option>Leo</option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px;">Step 2: Choose Date</label>
                <input type="date" required
                    style="width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px;">Step 3: Number of Seats</label>
                <select required
                    style="width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; box-sizing: border-box;">
                    <option>1 Seat</option>
                    <option>2 Seats</option>
                    <option>3 Seats</option>
                    <option>4 Seats</option>
                    <option>5 Seats</option>
                </select>
            </div>


            <button type="submit"
                style="width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; font-size: 16px; cursor: pointer; font-weight: bold;">Confirm
                & Book Now</button>
            <div style="text-align:center; margin-top: 25px; font-size: 14px">
                <a href="https://google.com" target="_blank">Read our terms and services</a>
            </div>

        </form>
    </main>

</body>

</html>
